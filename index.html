<script>
  const header = document.querySelector('.site-header');
  const backToTopButton = document.getElementById('backToTop');

  function updateHeader() {
    if (!header) return;
    if (window.scrollY > 24) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }

  function updateBackToTop() {
    if (!backToTopButton) return;
    if (window.scrollY > 500) {
      backToTopButton.classList.add('is-visible');
    } else {
      backToTopButton.classList.remove('is-visible');
    }
  }

  const revealTargets = document.querySelectorAll('.hero, .page-hero, .section, .card');

  revealTargets.forEach((el, index) => {
    if (el.classList.contains('card')) {
      el.classList.add('reveal-soft');
      el.style.transitionDelay = `${Math.min(index * 0.05, 0.2)}s`;
    } else {
      el.classList.add('reveal');
    }
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      } else if (!entry.target.classList.contains('hero') && !entry.target.classList.contains('page-hero')) {
        entry.target.classList.remove('is-visible');
      }
    });
  }, {
    threshold: 0.12,
    rootMargin: '0px 0px -40px 0px'
  });

  revealTargets.forEach((el) => observer.observe(el));

  if (backToTopButton) {
    backToTopButton.addEventListener('click', () => {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });
  }

  updateHeader();
  updateBackToTop();

  window.addEventListener('scroll', () => {
    updateHeader();
    updateBackToTop();
  }, { passive: true });
</script>
