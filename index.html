<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const header = document.querySelector('.site-header');
  const revealItems = document.querySelectorAll('.reveal, .reveal-soft');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const rect = entry.boundingClientRect;
      const inViewportBand =
        rect.top < window.innerHeight * 0.78 &&
        rect.bottom > window.innerHeight * 0.22;

      if (entry.isIntersecting && inViewportBand) {
        entry.target.classList.add('is-visible');
      } else {
        entry.target.classList.remove('is-visible');
      }
    });
  }, {
    threshold: [0, 0.15, 0.35, 0.55, 0.75, 1]
  });

  revealItems.forEach((item) => observer.observe(item));

  function updateHeaderState() {
    if (window.scrollY > 16) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }

  function updateRevealStates() {
    revealItems.forEach((item) => {
      const rect = item.getBoundingClientRect();
      const inViewportBand =
        rect.top < window.innerHeight * 0.78 &&
        rect.bottom > window.innerHeight * 0.22;

      if (inViewportBand) {
        item.classList.add('is-visible');
      } else {
        item.classList.remove('is-visible');
      }
    });
  }

  window.addEventListener('scroll', () => {
    updateHeaderState();
    updateRevealStates();
  });

  window.addEventListener('resize', updateRevealStates);

  updateHeaderState();
  updateRevealStates();
</script>
